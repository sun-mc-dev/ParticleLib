# ──────────────────────────────────────────────
#  ParticleLib  Configuration
# ──────────────────────────────────────────────

# When true, particles use Paper's forceShow flag to bypass
# the default 32-block client-side visibility cap.
# Only effective on Paper 1.21.4+ and Folia.
force-show-particles: false

# ──────────────────────────────────────────────
#  Performance
# ──────────────────────────────────────────────
performance:
  # Maximum number of concurrent active effects across all plugins.
  # Effects beyond this limit are silently dropped.
  # 0 = unlimited (not recommended on busy servers).
  max-active-effects: 500

  # If true, players whose client render distance is below
  # 'min-render-distance-chunks' will be excluded from particle recipients.
  respect-client-render-distance: true
  min-render-distance-chunks: 4